<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Logic IQ</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0d0f;
  color: white;
}

.app {
  display: grid;
  grid-template-columns: 250px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: #111418;
  padding: 20px;
  border-right: 1px solid #333;
}

.logo {
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 2px;
}

.logo span {
  color: #ff5a1f;
}

.nav button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  background: #1a1e23;
  color: white;
  border: 1px solid #333;
  cursor: pointer;
}

.nav button:hover {
  border-color: #ff5a1f;
}

.main {
  padding: 25px;
}

.hero {
  border: 1px solid #333;
  padding: 20px;
  margin-bottom: 20px;
}

.card {
  background: #15191e;
  padding: 20px;
  border: 1px solid #333;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a1e23;
  border: 1px solid #444;
  color: white;
}

button.primary {
  background: #ff5a1f;
  border: none;
  padding: 12px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  padding: 15px;
  border-left: 4px solid #ff5a1f;
  background: #0f1215;
}
</style>
</head>

<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">FIELD LOGIC <span>IQ</span></div>

    <div class="nav">
      <button onclick="showHome()">Dashboard</button>
      <button onclick="showAI()">AI Assist</button>
      <button onclick="showTroubleshoot()">Troubleshoot</button>
      <button onclick="showCalculator()">Calculators</button>
      <button onclick="showLoop()">4-20mA Loop</button>
    </div>
  </aside>

  <main class="main">
    <div class="hero">
      <h1>Field Intelligence Console</h1>
      <p>Find the Fault. Fix the Flow.</p>
    </div>

    <div id="content"></div>
  </main>
</div>

<script>

const content = document.getElementById("content");

function showHome() {
  content.innerHTML = `
    <div class="card">
      <h2>Tool Command Center</h2>
      <p>Select a tool from the left.</p>
    </div>
  `;
}

function showAI() {
  content.innerHTML = `
    <div class="card">
      <h2>AI Assist</h2>
      <input id="question" placeholder="Ask a question" />
      <button class="primary" onclick="askAI()">Run</button>
      <div id="response" class="result"></div>
    </div>
  `;
}

function askAI() {
  const q = document.getElementById("question").value.toLowerCase();
  const r = document.getElementById("response");

  if (q.includes("valve")) {
    r.innerHTML = "Check stiction, air supply, and positioner.";
  } else if (q.includes("loop")) {
    r.innerHTML = "Check power supply, wiring, and signal.";
  } else {
    r.innerHTML = "Check power, signal, and configuration.";
  }
}

function showTroubleshoot() {
  content.innerHTML = `
    <div class="card">
      <h2>Troubleshooting</h2>

      <select id="fault">
        <option value="valve">Valve Hunting</option>
        <option value="loop">Loop Dead</option>
      </select>

      <button class="primary" onclick="runTroubleshoot()">Run</button>
      <div id="out" class="result"></div>
    </div>
  `;
}

function runTroubleshoot() {
  const f = document.getElementById("fault").value;
  const out = document.getElementById("out");

  if (f === "valve") {
    out.innerHTML = "Check air supply, actuator, and tuning.";
  } else {
    out.innerHTML = "Check 24VDC, wiring, and transmitter.";
  }
}

function showCalculator() {
  content.innerHTML = `
    <div class="card">
      <h2>mA Calculator</h2>

      <select id="type">
        <option value="maToPercent">mA → %</option>
        <option value="percentToMa">% → mA</option>
      </select>

      <input id="val" placeholder="Enter value" />

      <button class="primary" onclick="calc()">Calculate</button>
      <div id="res" class="result"></div>
    </div>
  `;
}

function calc() {
  const type = document.getElementById("type").value;
  const val = Number(document.getElementById("val").value);
  const res = document.getElementById("res");

  if (!val && val !== 0) {
    res.innerHTML = "Enter a value";
    return;
  }

  if (type === "maToPercent") {
    res.innerHTML = ((val - 4) / 16 * 100).toFixed(2) + "%";
  } else {
    res.innerHTML = (4 + (val / 100 * 16)).toFixed(2) + " mA";
  }
}

function showLoop() {
  content.innerHTML = `
    <div class="card">
      <h2>Loop Diagnostic</h2>

      <input id="ma" placeholder="mA" />
      <button class="primary" onclick="loop()">Run</button>

      <div id="loopRes" class="result"></div>
    </div>
  `;
}

function loop() {
  const ma = Number(document.getElementById("ma").value);
  const r = document.getElementById("loopRes");

  if (ma < 3.8) {
    r.innerHTML = "Under-range fault. Check power and wiring.";
  } else if (ma <= 20.5) {
    r.innerHTML = "Normal signal.";
  } else {
    r.innerHTML = "Over-range. Check transmitter.";
  }
}

showHome();

</script>
</body>
</html>
