<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Field Logic IQ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>FIELD LOGIC <span class="accent">IQ</span></h1>
    <p class="tagline">Find the Fault. Fix the Flow.</p>

    <div class="grid">
      <button onclick="showScreen('ai')">AI Assist</button>
      <button onclick="showScreen('troubleshoot')">Troubleshoot</button>
      <button onclick="showScreen('calculator')">Calculators</button>
    </div>

    <div id="screen" class="screen">
      <p>Select a tool to begin.</p>
    </div>
  </div>

  <script>
    function showScreen(type) {
      const screen = document.getElementById("screen");

      if (type === "ai") {
        screen.innerHTML = `
          <h2>AI Assist</h2>
          <p>Ask a question:</p>
          <input id="question" placeholder="Why is my valve hunting?" />
          <button onclick="askAI()">Ask</button>
          <p id="response"></p>
        `;
      }

      if (type === "troubleshoot") {
        screen.innerHTML = `
          <h2>Troubleshooting</h2>
          <p>Select system:</p>
          <button onclick="showResult('valve')">Valve</button>
          <button onclick="showResult('loop')">4-20mA Loop</button>
          <p id="result"></p>
        `;
      }

      if (type === "calculator") {
        screen.innerHTML = `
          <h2>Electrical Calculator</h2>
          <p>Voltage (V):</p>
          <input id="voltage" />
          <p>Resistance (Ω):</p>
          <input id="resistance" />
          <button onclick="calculateCurrent()">Calculate Current</button>
          <p id="calcResult"></p>
        `;
      }
    }

    function askAI() {
      const q = document.getElementById("question").value.toLowerCase();
      const response = document.getElementById("response");

      if (q.includes("valve")) {
        response.innerText = "Likely causes: stiction, poor tuning, or low supply pressure. Check actuator response and positioner.";
      } else if (q.includes("loop")) {
        response.innerText = "Check loop current, power supply, and total resistance. Verify 4-20mA signal range.";
      } else {
        response.innerText = "Check inputs, power, and signal integrity. Narrow down by isolating components.";
      }
    }

    function showResult(type) {
      const result = document.getElementById("result");

      if (type === "valve") {
        result.innerText = "Possible issue: valve stiction, actuator supply problem, or positioner tuning.";
      }

      if (type === "loop") {
        result.innerText = "Check 24VDC supply, loop resistance, transmitter output, and PLC/DCS input.";
      }
    }

    function calculateCurrent() {
      const v = Number(document.getElementById("voltage").value);
      const r = Number(document.getElementById("resistance").value);

      if (!v || !r) {
        document.getElementById("calcResult").innerText = "Enter voltage and resistance.";
        return;
      }

      const current = v / r;
      document.getElementById("calcResult").innerText = "Current: " + current.toFixed(2) + " A";
    }
  </script>

</body>
</html>
