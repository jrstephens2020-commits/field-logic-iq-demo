<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Field Logic IQ</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #080a0c;
  color: white;
}

.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: #0c0f12;
  border-right: 1px solid #2e3338;
  padding: 20px 16px;
}

/* FIXED LOGO ALIGNMENT */
.logo {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.logo span {
  color: #ff5a1f;
  border: 2px solid #ff5a1f;
  border-radius: 6px;
  padding: 2px 8px;
  width: fit-content;
}

.powered {
  color: #999;
  font-size: 11px;
  margin: 12px 0 25px;
  text-transform: uppercase;
}

/* NAV */
.nav button {
  width: 100%;
  background: #12161a;
  color: white;
  border: 1px solid #30353a;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
  text-align: left;
  font-weight: 700;
  cursor: pointer;
}

.nav button:hover {
  border-color: #ff5a1f;
  color: #ff5a1f;
}

/* MAIN */
.main {
  padding: 26px;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #12161a, #07090a);
  border: 1px solid #30353a;
  border-radius: 14px;
  padding: 26px;
  margin-bottom: 20px;
}

.hero h1 {
  margin: 0;
  font-size: 32px;
  letter-spacing: 4px;
}

.hero p {
  color: #aaa;
  margin-top: 10px;
}

.tagline {
  margin-top: 15px;
  letter-spacing: 3px;
  font-weight: bold;
}

.tagline span { color: #ff5a1f; }

/* METRICS (CLEARED) */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.card {
  background: #15191e;
  border: 1px solid #30353a;
  border-radius: 12px;
  padding: 18px;
}

.metric {
  font-size: 28px;
  font-weight: 900;
}

.orange { color: #ff5a1f; }
.blue { color: #1e90ff; }
.green { color: #22c55e; }

/* TOOL GRID */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.tool {
  background: #090b0d;
  border: 1px solid #323840;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
}

.tool:hover {
  border-color: #ff5a1f;
}

/* FORM */
input, select {
  width: 100%;
  background: #0b0d0f;
  border: 1px solid #3a4047;
  color: white;
  padding: 12px;
  margin: 8px 0;
}

button.primary {
  width: 100%;
  background: #ff5a1f;
  border: none;
  padding: 14px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 12px;
  padding: 14px;
  background: #0b0d0f;
  border-left: 4px solid #ff5a1f;
}

/* MOBILE */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: 1fr; }
  .tool-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      FIELD LOGIC
      <span>IQ</span>
    </div>

    <div class="powered">Powered by FaultLine Energy</div>

    <div class="nav">
      <button onclick="showHome()">Dashboard</button>
      <button onclick="showCalculator()">Calculators</button>
      <button onclick="showLoop()">4-20mA Loop</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <section class="hero">
      <h1>Field Intelligence Console</h1>
      <p>Industrial tools for instrumentation, automation, and field diagnostics.</p>
      <div class="tagline">Find the <span>Fault</span>. Fix the <span>Flow</span>.</div>
    </section>

    <!-- CLEARED METRICS -->
    <section class="metrics">
      <div class="card"><div class="metric orange">--</div>Active Cases</div>
      <div class="card"><div class="metric orange">--</div>Critical Alerts</div>
      <div class="card"><div class="metric blue">--</div>Resolved Today</div>
      <div class="card"><div class="metric green">--</div>System Health</div>
    </section>

    <div id="content"></div>

  </main>
</div>

<script>

const content = document.getElementById("content");

/* HOME */
function showHome() {
  content.innerHTML = `
    <div class="card">
      <h2>Tool Command Center</h2>
      <div class="tool-grid">
        <div class="tool" onclick="showCalculator()">Instrumentation Calculators</div>
        <div class="tool" onclick="showLoop()">4-20mA Loop Diagnostics</div>
      </div>
    </div>
  `;
}

/* CALCULATOR */
function showCalculator() {
  content.innerHTML = `
    <div class="card">
      <h2>mA Calculator</h2>

      <select id="type">
        <option value="maToPercent">mA → %</option>
        <option value="percentToMa">% → mA</option>
      </select>

      <input id="val" placeholder="Enter value" />

      <button class="primary" onclick="calc()">Calculate</button>
      <div id="res" class="result"></div>
    </div>
  `;
}

function calc() {
  const type = document.getElementById("type").value;
  const val = Number(document.getElementById("val").value);
  const res = document.getElementById("res");

  if (!val && val !== 0) {
    res.innerHTML = "Enter a value";
    return;
  }

  if (type === "maToPercent") {
    res.innerHTML = ((val - 4) / 16 * 100).toFixed(2) + "%";
  } else {
    res.innerHTML = (4 + (val / 100 * 16)).toFixed(2) + " mA";
  }
}

/* LOOP TOOL */
function showLoop() {
  content.innerHTML = `
    <div class="card">
      <h2>Loop Diagnostic</h2>

      <input id="ma" placeholder="Measured mA" />

      <button class="primary" onclick="loop()">Run</button>
      <div id="loopRes" class="result"></div>
    </div>
  `;
}

function loop() {
  const ma = Number(document.getElementById("ma").value);
  const r = document.getElementById("loopRes");

  if (ma < 3.8) {
    r.innerHTML = "Under-range fault. Check power and wiring.";
  } else if (ma <= 20.5) {
    r.innerHTML = "Signal normal.";
  } else {
    r.innerHTML = "Over-range. Check transmitter.";
  }
}

showHome();

</script>

</body>
</html>
