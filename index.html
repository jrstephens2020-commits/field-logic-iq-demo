<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Field Logic IQ</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #080a0c;
  color: white;
}

.app {
  display: grid;
  grid-template-columns: 250px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: #0c0f12;
  border-right: 1px solid #2e3338;
  padding: 20px;
}

.logo {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  line-height: 1.2;
}

.logo span {
  display: inline-block;
  margin-top: 6px;
  color: #ff5a1f;
  border: 2px solid #ff5a1f;
  padding: 2px 8px;
  border-radius: 6px;
}

.powered {
  color: #999;
  font-size: 11px;
  margin: 10px 0 25px;
}

/* NAV */
.nav button {
  width: 100%;
  background: #12161a;
  color: white;
  border: 1px solid #30353a;
  padding: 14px;
  margin-bottom: 10px;
  text-align: left;
  cursor: pointer;
}

.nav button:hover {
  border-color: #ff5a1f;
  color: #ff5a1f;
}

/* MAIN */
.main {
  padding: 25px;
}

/* HERO */
.hero {
  border: 1px solid #30353a;
  padding: 20px;
  margin-bottom: 20px;
}

.hero h1 {
  margin: 0;
  font-size: 30px;
}

/* METRICS (CLEARED) */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.card {
  background: #15191e;
  border: 1px solid #30353a;
  padding: 16px;
}

.metric {
  font-size: 26px;
  font-weight: bold;
}

.orange { color: #ff5a1f; }
.blue { color: #1e90ff; }
.green { color: #22c55e; }

/* FORM */
input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #0f1215;
  border: 1px solid #333;
  color: white;
}

button.primary {
  width: 100%;
  padding: 12px;
  background: #ff5a1f;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 12px;
  padding: 12px;
  background: #0f1215;
  border-left: 4px solid #ff5a1f;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      FIELD LOGIC<br>
      <span>IQ</span>
    </div>

    <div class="powered">Powered by FaultLine Energy</div>

    <div class="nav">
      <button onclick="showHome()">Dashboard</button>
      <button onclick="showAI()">AI Assist</button>
      <button onclick="showTroubleshoot()">Troubleshooting</button>
      <button onclick="showCalculator()">Calculators</button>
      <button onclick="showLoop()">4-20mA Loop</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="hero">
      <h1>Field Intelligence Console</h1>
      <p>Find the Fault. Fix the Flow.</p>
    </div>

    <!-- CLEARED METRICS -->
    <section class="metrics">
      <div class="card"><div class="metric orange">--</div>Active Cases</div>
      <div class="card"><div class="metric orange">--</div>Critical Alerts</div>
      <div class="card"><div class="metric blue">--</div>Resolved Today</div>
      <div class="card"><div class="metric green">--</div>System Health</div>
    </section>

    <div id="content"></div>

  </main>
</div>

<script>

const content = document.getElementById("content");

/* HOME */
function showHome() {
  content.innerHTML = "<div class='card'>Select a tool from the sidebar.</div>";
}

/* AI */
function showAI() {
  content.innerHTML = `
    <div class="card">
      <h2>AI Assist</h2>
      <input id="q" placeholder="Ask a field question"/>
      <button class="primary" onclick="runAI()">Run</button>
      <div id="aiRes" class="result"></div>
    </div>
  `;
}

function runAI() {
  const q = document.getElementById("q").value.toLowerCase();
  const r = document.getElementById("aiRes");

  if (q.includes("valve")) {
    r.innerHTML = "Check air, positioner, and stiction.";
  } else if (q.includes("loop")) {
    r.innerHTML = "Check power, wiring, and signal.";
  } else {
    r.innerHTML = "Check power, signal, and configuration.";
  }
}

/* TROUBLESHOOT */
function showTroubleshoot() {
  content.innerHTML = `
    <div class="card">
      <h2>Troubleshooting</h2>
      <select id="fault">
        <option value="valve">Valve Issue</option>
        <option value="loop">Loop Issue</option>
      </select>
      <button class="primary" onclick="runTS()">Run</button>
      <div id="tsRes" class="result"></div>
    </div>
  `;
}

function runTS() {
  const f = document.getElementById("fault").value;
  const r = document.getElementById("tsRes");

  if (f === "valve") {
    r.innerHTML = "Check actuator, air, and tuning.";
  } else {
    r.innerHTML = "Check power supply and wiring.";
  }
}

/* CALCULATOR */
function showCalculator() {
  content.innerHTML = `
    <div class="card">
      <h2>Calculator</h2>
      <input id="ma" placeholder="mA"/>
      <button class="primary" onclick="calc()">Convert to %</button>
      <div id="calcRes" class="result"></div>
    </div>
  `;
}

function calc() {
  const ma = Number(document.getElementById("ma").value);
  document.getElementById("calcRes").innerHTML =
    ((ma - 4) / 16 * 100).toFixed(2) + "%";
}

/* LOOP */
function showLoop() {
  content.innerHTML = `
    <div class="card">
      <h2>Loop Diagnostic</h2>
      <input id="loop" placeholder="mA"/>
      <button class="primary" onclick="runLoop()">Run</button>
      <div id="loopRes" class="result"></div>
    </div>
  `;
}

function runLoop() {
  const ma = Number(document.getElementById("loop").value);
  const r = document.getElementById("loopRes");

  if (ma < 3.8) r.innerHTML = "Under-range fault";
  else if (ma <= 20.5) r.innerHTML = "Normal";
  else r.innerHTML = "Over-range";
}

showHome();

</script>

</body>
</html>
